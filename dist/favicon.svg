<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle with purple gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <!-- Printer icon (simplified) -->
  <!-- Paper tray -->
  <rect x="18" y="38" width="28" height="12" rx="2" fill="white" opacity="0.95"/>
  <!-- Printer body -->
  <rect x="14" y="24" width="36" height="18" rx="4" fill="white" opacity="0.2"/>
  <rect x="14" y="24" width="36" height="18" rx="4" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  <!-- Paper coming out -->
  <rect x="20" y="18" width="24" height="12" rx="2" fill="white" opacity="0.9"/>
  <!-- Print lines on paper -->
  <rect x="23" y="21" width="14" height="1.5" rx="1" fill="#7c3aed" opacity="0.7"/>
  <rect x="23" y="24" width="10" height="1.5" rx="1" fill="#7c3aed" opacity="0.5"/>
  <!-- Printer feed slot -->
  <rect x="20" y="30" width="24" height="2" rx="1" fill="white" opacity="0.4"/>
</svg>
